org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
# Désactivé : le configuration cache fige des chemins absolus au moment où
# il est écrit. Réutilisé entre environnements différents (ex. build local
# dans un container /root/... puis cache restauré sur le runner CI
# /home/runner/...), il fait planter compileFlutterBuildDebug en essayant
# de créer des dossiers sous un chemin qui n'existe pas sur le runner.
org.gradle.configuration-cache=false
android.useAndroidX=true
# Flutter Gradle plugin ne supporte pas encore la nouvelle DSL d'AGP 9.x
android.newDsl=false
# Flutter Gradle plugin ne trouve pas KGP avec le mode built-in d'AGP 9.x
android.builtInKotlin=false
